services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-inventory_db}
      POSTGRES_USER: ${DB_USER:-db_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-db_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-db_user} -d ${DB_NAME:-inventory_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"

  web:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    command: >
      sh -c "pip install --quiet django-storages boto3 &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn inventory.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - db_volume:/app/db
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - XHS_API_KEY=${XHS_API_KEY:-}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-inventory_db}
      - DB_USER=${DB_USER:-db_user}
      - DB_PASSWORD=${DB_PASSWORD:-db_password}
      - DB_HOST=db
      - DB_PORT=5432
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-ioe-media}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_PUBLIC_DOMAIN=${MINIO_PUBLIC_DOMAIN:-localhost:9002/ioe-media}
      - DIFY_BASE_URL=${DIFY_BASE_URL:-http://host.docker.internal}
      - DIFY_RECEIPT_API_KEY=${DIFY_RECEIPT_API_KEY:-}
    networks:
      - default
      - dify_net

volumes:
  static_volume: {}
  media_volume: {}
  db_volume: {}
  pg_data: {}
  minio_data: {}

networks:
  default: {}
  dify_net:
    name: docker_default
    external: true
