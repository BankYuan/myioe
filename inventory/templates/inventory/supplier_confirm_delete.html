{% extends 'inventory/base.html' %}

{% block title %}删除供应商 - {{ block.super }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-body">
                <h4 class="text-danger"><i class="bi bi-exclamation-triangle me-1"></i>确认删除</h4>
                <p class="mt-3">确定删除供应商「<strong>{{ supplier.name }}</strong>」吗?</p>
                <div class="alert alert-info py-2">
                    关联的商品、进货/退货流水的「供应商」字段会自动置空(商品和库存记录不会被删除),可放心删除。
                </div>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>确认删除</button>
                    <a href="{% url 'supplier_list' %}" class="btn btn-outline-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
