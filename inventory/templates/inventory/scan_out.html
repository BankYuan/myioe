{% extends 'inventory/base.html' %}
{% load crispy_forms_tags %}

{% block title %}扫码出库 - {{ block.super }}{% endblock %}

{% block content %}
{% csrf_token %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="card-title mb-0"><i class="bi bi-upc-scan me-1"></i>扫码出库</h2>
                        <p class="text-muted mb-0">直接扣库存(内部领用 / 报损 / 调拨);<span class="text-warning">卖给顾客请走「销售管理 → 收银台」留账</span></p>
                    </div>
                    <a href="{% url 'inventory_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> 返回</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-light"><h6 class="mb-0">扫码操作</h6></div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">数量(本次出库件数)</label>
                    <input type="number" id="qty" class="form-control form-control-lg" value="1" min="1" step="1" inputmode="numeric">
                </div>
                <div class="mb-3">
                    <label class="form-label">条码(扫码枪扫入,或手输后回车)</label>
                    <input type="text" id="barcode-input" class="form-control form-control-lg" autofocus autocomplete="off" placeholder="扫条码...">
                </div>
                <button id="scan-btn" class="btn btn-warning btn-lg w-100"><i class="bi bi-box-arrow-up me-1"></i>确认出库</button>
            </div>
        </div>
    </div>
    <div class="col-md-7">
        <div class="card">
            <div class="card-header bg-light"><h6 class="mb-0">本次已扫</h6></div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-sm">
                        <thead><tr><th>时间</th><th>商品</th><th>数量</th><th>操作后库存</th></tr></thead>
                        <tbody id="log-tbody"></tbody>
                    </table>
                </div>
                <div class="text-muted small">本次共 <span id="total-count">0</span> 件,涉及 <span id="total-sku">0</span> 款</div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="position-fixed top-0 end-0 m-3" style="z-index:1080;display:none;min-width:280px;"></div>
{% endblock %}

{% block extra_js %}
<script>
let totalQty = 0;
const skuSet = new Set();

function getCsrf() {
    const m = document.cookie.match(/csrftoken=([^;]+)/);
    if (m) return m[1];
    const inp = document.querySelector('[name=csrfmiddlewaretoken]');
    return inp ? inp.value : '';
}
function toast(msg, ok = true) {
    const el = document.getElementById('toast');
    el.innerHTML = `<div class="alert alert-${ok ? 'success' : 'danger'} shadow">${msg}</div>`;
    el.style.display = 'block';
    clearTimeout(window.__t);
    window.__t = setTimeout(() => { el.style.display = 'none'; }, 2500);
}
function addLog(name, qty, stock) {
    const t = new Date().toLocaleTimeString();
    document.getElementById('log-tbody').insertAdjacentHTML('afterbegin',
        `<tr><td>${t}</td><td>${name}</td><td class="text-danger">-${qty}</td><td>${stock}</td></tr>`);
    totalQty += qty; skuSet.add(name);
    document.getElementById('total-count').textContent = totalQty;
    document.getElementById('total-sku').textContent = skuSet.size;
}
function focusBarcode() {
    const b = document.getElementById('barcode-input');
    b.value = ''; b.focus();
}

async function doScan() {
    const barcode = document.getElementById('barcode-input').value.trim();
    const qty = parseInt(document.getElementById('qty').value) || 1;
    if (!barcode) return;
    const fd = new FormData();
    fd.append('barcode', barcode); fd.append('quantity', qty);
    try {
        const r = await fetch('{% url "inventory_scan_out" %}', {
            method: 'POST', body: fd,
            headers: { 'X-CSRFToken': getCsrf(), 'X-Requested-With': 'XMLHttpRequest' }
        });
        const d = await r.json();
        if (d.success) {
            const low = d.low_stock ? ' <span class="text-danger">(库存偏低)</span>' : '';
            toast(`✓ ${d.name} 出库 -${qty},当前库存 ${d.new_stock}${low}`);
            addLog(d.name, qty, d.new_stock);
            focusBarcode();
        } else if (d.insufficient) {
            toast(`✗ ${d.name} 库存不足:仅剩 ${d.stock},要出 ${d.requested}`, false);
        } else if (d.unknown) {
            toast(`✗ 库内无此商品(${d.barcode}),请先建档`, false);
        } else {
            toast(`✗ ${d.error || '操作失败'}`, false);
        }
    } catch (e) { toast('✗ 网络错误', false); }
}

document.getElementById('barcode-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doScan(); }
});
document.getElementById('scan-btn').addEventListener('click', doScan);
</script>
{% endblock %}
