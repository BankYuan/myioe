{% extends 'inventory/base.html' %}

{% block title %}拍照识别单据 - {{ block.super }}{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-7 offset-md-2">
        <div class="card">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-camera me-1"></i>拍照识别单据(进货/退货)</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-info py-2 mb-3">
                    上传任意供应商的<strong>进货单</strong>或<strong>退货单</strong>截图(商路花/其他小程序/拍照都行),AI 自动判断方向并识别商品明细,你核对后提交(进货入库 / 退货出库)。
                </div>
                <form method="post" enctype="multipart/form-data" id="rec-form">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">选择 / 拖拽进货单截图</label>
                        <input type="file" name="image" id="image-input" accept="image/*" class="form-control" required>
                    </div>
                    <div id="preview" class="mb-3" style="display:none;">
                        <img id="preview-img" class="img-thumbnail" style="max-height:320px;">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100" id="rec-btn">
                        <i class="bi bi-magic me-1"></i>上传并识别
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('image-input').addEventListener('change', function(e) {
    const f = e.target.files[0];
    if (f) {
        document.getElementById('preview-img').src = URL.createObjectURL(f);
        document.getElementById('preview').style.display = 'block';
    }
});
document.getElementById('rec-form').addEventListener('submit', function() {
    const btn = document.getElementById('rec-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>AI 识别中,请稍候(约 10-30 秒)...';
});
</script>
{% endblock %}
